<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="bg-admin" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <linearGradient id="shield" x1="70" y1="50" x2="130" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d68910"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-admin)"/>
  
  <!-- Shield icon -->
  <path d="M100 40 L140 60 L140 100 Q140 140 100 160 Q60 140 60 100 L60 60 Z" 
        fill="url(#shield)" opacity="0.9"/>
  <path d="M100 50 L130 65 L130 100 Q130 130 100 145 Q70 130 70 100 L70 65 Z" 
        fill="#0a0a14" opacity="0.8"/>
  
  <!-- Admin badge (A) -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        fill="#f5a623" text-anchor="middle">A</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="14" r="4" fill="#f5a623" opacity="0.6"/>
  <circle cx="158" cy="42" r="6" fill="#f5a623" opacity="0.4"/>
  <circle cx="42" cy="158" r="5" fill="#f5a623" opacity="0.5"/>
  
  <!-- Border ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#f5a623" stroke-width="2.5" opacity="0.7"/>
</svg>
