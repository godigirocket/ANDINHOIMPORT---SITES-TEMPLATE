<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="phone" x1="68" y1="45" x2="120" y2="135" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  
  <!-- Decorative stars -->
  <circle cx="100" cy="14" r="4" fill="#555"/>
  <circle cx="158" cy="42" r="6" fill="#444"/>
  <circle cx="62" cy="168" r="3" fill="#444"/>
  
  <!-- Phone icon (rotated) -->
  <g transform="rotate(-20 100 100)">
    <rect x="68" y="45" width="52" height="90" rx="9" fill="url(#phone)"/>
    <rect x="72" y="52" width="44" height="72" rx="5" fill="#050508"/>
    <!-- Screen reflection -->
    <rect x="73" y="53" width="14" height="28" rx="3" fill="white" opacity="0.07"/>
  </g>
  
  <!-- Golden accent circle -->
  <circle cx="38" cy="108" r="12" fill="url(#glow)"/>
  
  <!-- Border ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.5"/>
</svg>
